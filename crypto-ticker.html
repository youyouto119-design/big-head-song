<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时加密货币价格追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #f7931a 0%, #f12711 100%);
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(247, 147, 26, 0.3);
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: white;
        }
        
        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }
        
        input {
            flex: 1;
            padding: 12px;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #f7931a;
        }
        
        input::placeholder {
            color: #94a3b8;
        }
        
        button {
            padding: 12px 30px;
            background: #f7931a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #e68015;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: transparent;
            color: #94a3b8;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #f7931a;
            border-bottom-color: #f7931a;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .crypto-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .crypto-card:hover {
            border-color: #f7931a;
            box-shadow: 0 0 20px rgba(247, 147, 26, 0.2);
            transform: translateY(-5px);
        }
        
        .crypto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .crypto-symbol {
            font-size: 20px;
            font-weight: bold;
            color: #e2e8f0;
        }
        
        .crypto-icon {
            font-size: 24px;
            margin-right: 8px;
        }
        
        .remove-btn {
            background: #ef4444;
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .remove-btn:hover {
            background: #dc2626;
        }
        
        .crypto-price {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #e2e8f0;
        }
        
        .crypto-change {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .up {
            color: #10b981;
        }
        
        .down {
            color: #ef4444;
        }
        
        .crypto-info {
            font-size: 14px;
            color: #94a3b8;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .info-item {
            padding: 8px;
            background: #0f172a;
            border-radius: 6px;
            border-left: 3px solid #f7931a;
        }
        
        .info-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 3px;
        }
        
        .info-value {
            font-size: 14px;
            color: #e2e8f0;
            font-weight: bold;
        }
        
        .chart-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            height: 350px;
        }
        
        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #ef4444;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .success {
            background: #064e3b;
            color: #86efac;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #10b981;
            display: none;
        }
        
        .success.show {
            display: block;
        }
        
        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
            font-size: 18px;
        }
        
        .loader {
            border: 4px solid #334155;
            border-top: 4px solid #f7931a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #f7931a;
        }
        
        .popular-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .popular-btn {
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .popular-btn:hover {
            background: #f7931a;
            border-color: #f7931a;
            color: white;
        }
        
        .refresh-btn {
            background: #0ea5e9;
            padding: 8px 15px;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .refresh-btn:hover {
            background: #0284c7;
        }
        
        .last-update {
            text-align: center;
            color: #64748b;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🪙 实时加密货币价格追踪</h1>
            <p class="subtitle">使用 CoinGecko API 实时监控您喜爱的数字资产</p>
        </header>
        
        <div class="search-box">
            <input 
                type="text" 
                id="symbolInput" 
                placeholder="输入币种代码 (如: BTC, ETH, XRP, ADA)"
                autocomplete="off"
            >
            <button onclick="addCrypto()">添加</button>
        </div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">📊 概览</button>
            <button class="tab-btn" onclick="switchTab('details')">📋 详情</button>
            <button class="tab-btn" onclick="switchTab('popular')">⭐ 热门币种</button>
            <button class="tab-btn" onclick="switchTab('chart')">📈 图表</button>
        </div>
        
        <!-- 概览标签页 -->
        <div id="overview" class="tab-content active">
            <div class="stats" id="statsContainer"></div>
            <button class="refresh-btn" onclick="refreshAllData()">🔄 刷新数据</button>
            <div class="crypto-grid" id="cryptoGrid">
                <div class="loading">输入币种代码开始查询...</div>
            </div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
        
        <!-- 详情标签页 -->
        <div id="details" class="tab-content">
            <button class="refresh-btn" onclick="refreshAllData()">🔄 刷新数据</button>
            <div class="crypto-grid" id="cryptoDetails">
                <div class="loading">输入币种代码开始查询...</div>
            </div>
        </div>
        
        <!-- 热门币种标签页 -->
        <div id="popular" class="tab-content">
            <h2 style="margin-bottom: 15px;">热门加密货币 - 点击快速添加</h2>
            <div class="popular-list" id="popularList"></div>
        </div>
        
        <!-- 图表标签页 -->
        <div id="chart" class="tab-content">
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let cryptoList = ['BTC', 'ETH', 'BNB'];
        let cryptoData = {};
        let chart = null;
        
        // 热门币种
        const popularCryptos = [
            { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin', icon: '₿' },
            { id: 'ethereum', symbol: 'ETH', name: 'Ethereum', icon: 'Ξ' },
            { id: 'binancecoin', symbol: 'BNB', name: 'Binance Coin', icon: '◆' },
            { id: 'ripple', symbol: 'XRP', name: 'Ripple', icon: '✕' },
            { id: 'cardano', symbol: 'ADA', name: 'Cardano', icon: '⧬' },
            { id: 'solana', symbol: 'SOL', name: 'Solana', icon: '◎' },
            { id: 'polkadot', symbol: 'DOT', name: 'Polkadot', icon: '●' },
            { id: 'litecoin', symbol: 'LTC', name: 'Litecoin', icon: 'Ł' },
            { id: 'dogecoin', symbol: 'DOGE', name: 'Dogecoin', icon: '🐕' },
            { id: 'tron', symbol: 'TRX', name: 'Tron', icon: '◆' },
            { id: 'avalanche-2', symbol: 'AVAX', name: 'Avalanche', icon: '▲' },
            { id: 'chainlink', symbol: 'LINK', name: 'Chainlink', icon: '⛓' }
        ];
        
        // 初始化热门币种按钮
        function initPopularButtons() {
            const popularList = document.getElementById('popularList');
            popularList.innerHTML = popularCryptos.map(crypto => `
                <button class="popular-btn" onclick="addCryptoFromPopular('${crypto.symbol}', '${crypto.id}')" title="${crypto.name}">
                    ${crypto.icon} ${crypto.symbol}
                </button>
            `).join('');
        }
        
        // 从热门列表添加
        function addCryptoFromPopular(symbol, id) {
            if (cryptoList.includes(symbol)) {
                showError(`${symbol} 已在列表中`);
                return;
            }
            cryptoList.push(symbol);
            fetchCryptoData(symbol, id);
            hideError();
        }
        
        // 从 CoinGecko API 获取数据
        async function fetchCryptoData(symbol, id) {
            try {
                // 如果没有提供 id，根据 symbol 转换
                const cryptoId = id || getCryptoId(symbol);
                if (!cryptoId) {
                    showError(`不支持的币种: ${symbol}`);
                    return;
                }
                
                showLoading(`正在获取 ${symbol} 数据...`);
                
                // CoinGecko API - 完全免费，无需密钥
                const url = `https://api.coingecko.com/api/v3/simple/price?ids=${cryptoId}&vs_currencies=usd,cny,eur&include_market_cap=true&include_24hr_vol=true&include_24hr_change=true&include_last_updated_at=true`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`API 请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data[cryptoId]) {
                    showError(`无法找到币种: ${symbol}`);
                    cryptoList = cryptoList.filter(s => s !== symbol);
                    return;
                }
                
                const priceData = data[cryptoId];
                
                cryptoData[symbol] = {
                    symbol: symbol,
                    id: cryptoId,
                    price: priceData.usd || 0,
                    priceUSD: priceData.usd || 0,
                    priceCNY: priceData.cny || 0,
                    priceEUR: priceData.eur || 0,
                    change24h: priceData.usd_24h_change || 0,
                    marketCap: priceData.usd_market_cap || 0,
                    volume24h: priceData.usd_24h_vol || 0,
                    lastUpdated: priceData.last_updated_at || new Date().toISOString()
                };
                
                hideError();
                showSuccess(`成功添加 ${symbol}`);
                updateDisplay();
            } catch (error) {
                console.error('获取数据失败:', error);
                showError(`获取 ${symbol} 数据失败: ${error.message}`);
                cryptoList = cryptoList.filter(s => s !== symbol);
            }
        }
        
        // Symbol 转换为 CoinGecko ID
        function getCryptoId(symbol) {
            const symbolMap = {
                'BTC': 'bitcoin',
                'ETH': 'ethereum',
                'BNB': 'binancecoin',
                'XRP': 'ripple',
                'ADA': 'cardano',
                'SOL': 'solana',
                'DOT': 'polkadot',
                'LTC': 'litecoin',
                'DOGE': 'dogecoin',
                'TRX': 'tron',
                'AVAX': 'avalanche-2',
                'LINK': 'chainlink',
                'XLM': 'stellar',
                'BCH': 'bitcoin-cash',
                'ETC': 'ethereum-classic',
                'CRO': 'crypto-com-chain',
                'VET': 'vechain',
                'DENT': 'dent',
                'FIL': 'filecoin',
                'MATIC': 'matic-network',
                'NEAR': 'near',
                'SAND': 'the-sandbox',
                'MANA': 'decentraland',
                'USDC': 'usd-coin',
                'USDT': 'tether',
                'DAI': 'dai',
                'BUSD': 'binance-usd'
            };
            return symbolMap[symbol.toUpperCase()] || null;
        }
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        }
        
        // 格式化大数字
        function formatPrice(price) {
            if (price < 0.01) return price.toFixed(8);
            if (price < 1) return price.toFixed(6);
            if (price < 100) return price.toFixed(4);
            if (price < 10000) return price.toFixed(2);
            return price.toFixed(0);
        }
        
        // 更新统计信息
        function updateStats() {
            const statsContainer = document.getElementById('statsContainer');
            if (cryptoList.length === 0) {
                statsContainer.innerHTML = '';
                return;
            }
            
            let totalMarketCap = 0;
            let avgChange = 0;
            let gainers = 0;
            let losers = 0;
            
            cryptoList.forEach(symbol => {
                const data = cryptoData[symbol];
                if (data) {
                    totalMarketCap += data.marketCap;
                    avgChange += data.change24h;
                    if (data.change24h > 0) gainers++;
                    else losers++;
                }
            });
            
            statsContainer.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">总市值</div>
                    <div class="stat-value">$${formatNumber(totalMarketCap)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">平均涨幅</div>
                    <div class="stat-value ${avgChange >= 0 ? 'up' : 'down'}">
                        ${avgChange >= 0 ? '+' : ''}${(avgChange / cryptoList.length).toFixed(2)}%
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">上涨币种</div>
                    <div class="stat-value up">${gainers}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">下跌币种</div>
                    <div class="stat-value down">${losers}</div>
                </div>
            `;
        }
        
        // 更新显示
        function updateDisplay() {
            const cryptoGrid = document.getElementById('cryptoGrid');
            const cryptoDetails = document.getElementById('cryptoDetails');
            
            if (cryptoList.length === 0) {
                cryptoGrid.innerHTML = '<div class="loading">输入币种代码开始查询...</div>';
                cryptoDetails.innerHTML = '<div class="loading">输入币种代码开始查询...</div>';
                return;
            }
            
            let gridHTML = '';
            let detailsHTML = '';
            
            cryptoList.forEach(symbol => {
                const data = cryptoData[symbol];
                
                if (data) {
                    const isUp = data.change24h >= 0;
                    const changeClass = isUp ? 'up' : 'down';
                    const arrow = isUp ? '▲' : '▼';
                    
                    // 寻找对应的图标
                    const crypto = popularCryptos.find(c => c.symbol === symbol) || { icon: '🪙' };
                    
                    // 概览卡片
                    gridHTML += `
                        <div class="crypto-card">
                            <div class="crypto-header">
                                <span class="crypto-symbol">${crypto.icon} ${symbol}</span>
                                <button class="remove-btn" onclick="removeCrypto('${symbol}')">移除</button>
                            </div>
                            <div class="crypto-price">$${formatPrice(data.price)}</div>
                            <div class="crypto-change ${changeClass}">
                                ${arrow} ${Math.abs(data.change24h).toFixed(2)}% (24h)
                            </div>
                            <div class="crypto-info">
                                <div class="info-item">
                                    <div class="info-label">CNY</div>
                                    <div class="info-value">¥${formatNumber(data.priceCNY)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">EUR</div>
                                    <div class="info-value">€${formatPrice(data.priceEUR)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">市值</div>
                                    <div class="info-value">$${formatNumber(data.marketCap)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">24h 交易量</div>
                                    <div class="info-value">$${formatNumber(data.volume24h)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // 详情卡片
                    detailsHTML += `
                        <div class="crypto-card">
                            <div class="crypto-header">
                                <span class="crypto-symbol">${crypto.icon} ${symbol}</span>
                                <button class="remove-btn" onclick="removeCrypto('${symbol}')">移除</button>
                            </div>
                            <div class="crypto-price">$${formatPrice(data.price)}</div>
                            <div class="crypto-change ${changeClass}">
                                ${arrow} ${Math.abs(data.change24h).toFixed(2)}% (24h)
                            </div>
                            <div class="crypto-info">
                                <div class="info-item">
                                    <div class="info-label">美元价格 USD</div>
                                    <div class="info-value">$${formatPrice(data.priceUSD)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">人民币价格 CNY</div>
                                    <div class="info-value">¥${formatNumber(data.priceCNY)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">欧元价格 EUR</div>
                                    <div class="info-value">€${formatPrice(data.priceEUR)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">24h 涨跌</div>
                                    <div class="info-value ${changeClass}">${data.change24h >= 0 ? '+' : ''}${data.change24h.toFixed(2)}%</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">市场总值</div>
                                    <div class="info-value">$${formatNumber(data.marketCap)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">24h 成交量</div>
                                    <div class="info-value">$${formatNumber(data.volume24h)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            
            cryptoGrid.innerHTML = gridHTML || '<div class="loading">无数据</div>';
            cryptoDetails.innerHTML = detailsHTML || '<div class="loading">无数据</div>';
            updateStats();
            updateLastUpdate();
        }
        
        // 更新图表
        function updateChart() {
            if (cryptoList.length === 0) return;
            
            const labels = cryptoList;
            const data = cryptoList.map(symbol => {
                const crypto = cryptoData[symbol];
                return crypto ? crypto.change24h : 0;
            });
            
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '24h 涨跌幅 (%)',
                        data: data,
                        backgroundColor: data.map(d => d >= 0 ? '#10b981' : '#ef4444'),
                        borderColor: data.map(d => d >= 0 ? '#059669' : '#dc2626'),
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#e2e8f0' }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
        }
        
        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'chart') {
                setTimeout(updateChart, 100);
            } else if (tabName === 'popular') {
                initPopularButtons();
            }
        }
        
        // 添加加密货币
        function addCrypto() {
            const input = document.getElementById('symbolInput');
            const symbol = input.value.toUpperCase().trim();
            
            if (!symbol) {
                showError('请输入有效的币种代码');
                return;
            }
            
            if (cryptoList.includes(symbol)) {
                showError(`${symbol} 已在列表中`);
                return;
            }
            
            if (!getCryptoId(symbol)) {
                showError(`不支持的币种: ${symbol}，请选择热门币种或其他支持的币种`);
                return;
            }
            
            input.value = '';
            fetchCryptoData(symbol);
        }
        
        // 删除加密货币
        function removeCrypto(symbol) {
            cryptoList = cryptoList.filter(s => s !== symbol);
            delete cryptoData[symbol];
            updateDisplay();
        }
        
        // 刷新所有数据
        async function refreshAllData() {
            if (cryptoList.length === 0) return;
            
            showLoading('正在刷新数据...');
            let completed = 0;
            
            for (const symbol of cryptoList) {
                const id = getCryptoId(symbol);
                if (id) {
                    await fetchCryptoData(symbol, id);
                    completed++;
                }
            }
            
            hideError();
            showSuccess(`已刷新 ${completed} 个币种的数据`);
            setTimeout(() => {
                document.getElementById('success').classList.remove('show');
            }, 3000);
        }
        
        // 更新最后更新时间
        function updateLastUpdate() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            document.getElementById('lastUpdate').textContent = `最后更新: ${timeStr}`;
        }
        
        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
        
        // 隐藏错误
        function hideError() {
            document.getElementById('error').classList.remove('show');
        }
        
        // 显示成功
        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }
        
        // 显示加载
        function showLoading(message) {
            const grid = document.getElementById('cryptoGrid');
            grid.innerHTML = `<div class="loading"><div class="loader"></div>${message}</div>`;
        }
        
        // 回车添加
        document.getElementById('symbolInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addCrypto();
            }
        });
        
        // 初始化
        async function init() {
            initPopularButtons();
            // 初始化加载默认币种
            for (const symbol of cryptoList) {
                await fetchCryptoData(symbol);
            }
        }
        
        // 定时刷新（每 30 秒）
        setInterval(() => {
            if (cryptoList.length > 0) {
                cryptoList.forEach(symbol => {
                    const id = getCryptoId(symbol);
                    if (id) {
                        fetchCryptoData(symbol, id);
                    }
                });
            }
        }, 30000);
        
        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
