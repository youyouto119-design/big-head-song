<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级金融价格滚动插件</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }
        
        input {
            flex: 1;
            padding: 12px;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        input::placeholder {
            color: #94a3b8;
        }
        
        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
        }
        
        .tab-btn {
            background: transparent;
            color: #94a3b8;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stock-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .stock-card:hover {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
            transform: translateY(-5px);
        }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .stock-symbol {
            font-size: 20px;
            font-weight: bold;
            color: #e2e8f0;
        }
        
        .remove-btn {
            background: #ef4444;
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .remove-btn:hover {
            background: #dc2626;
        }
        
        .stock-price {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #e2e8f0;
        }
        
        .stock-change {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .up {
            color: #10b981;
        }
        
        .down {
            color: #ef4444;
        }
        
        .stock-info {
            font-size: 14px;
            color: #94a3b8;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .info-item {
            padding: 8px;
            background: #0f172a;
            border-radius: 6px;
        }
        
        .chart-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            height: 300px;
        }
        
        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #ef4444;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
            font-size: 18px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 高级金融价格追踪</h1>
            <p>实时监控您关注的股票和加密货币</p>
        </header>
        
        <div class="search-box">
            <input 
                type="text" 
                id="symbolInput" 
                placeholder="输入股票代码 (如: AAPL, BTC, ETH)"
                autocomplete="off"
            >
            <button onclick="addStock()">添加</button>
        </div>
        
        <div id="error" class="error"></div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">📊 概览</button>
            <button class="tab-btn" onclick="switchTab('details')">📋 详情</button>
            <button class="tab-btn" onclick="switchTab('chart')">📈 图表</button>
        </div>
        
        <!-- 概览标签页 -->
        <div id="overview" class="tab-content active">
            <div class="stats" id="statsContainer"></div>
            <div class="stock-grid" id="stockGrid">
                <div class="loading">输入股票代码开始查询...</div>
            </div>
        </div>
        
        <!-- 详情标签页 -->
        <div id="details" class="tab-content">
            <div class="stock-grid" id="stockDetails">
                <div class="loading">输入股票代码开始查询...</div>
            </div>
        </div>
        
        <!-- 图表标签页 -->
        <div id="chart" class="tab-content">
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let stocks = ['AAPL', 'GOOGL', 'MSFT'];
        let stockData = {};
        let chart = null;

        // 模拟数据
        function getMockStockData(symbol) {
            const mockData = {
                'AAPL': { 
                    symbol: 'AAPL', 
                    price: 195.5, 
                    change: 2.5, 
                    changePercent: 1.3,
                    name: 'Apple Inc.',
                    high: 198.2,
                    low: 192.1,
                    volume: 52300000,
                    pe: 28.5,
                    marketCap: '3.05T'
                },
                'GOOGL': { 
                    symbol: 'GOOGL', 
                    price: 140.3, 
                    change: -1.2, 
                    changePercent: -0.85,
                    name: 'Alphabet Inc.',
                    high: 142.5,
                    low: 138.9,
                    volume: 24500000,
                    pe: 25.3,
                    marketCap: '1.85T'
                },
                'MSFT': { 
                    symbol: 'MSFT', 
                    price: 380.5, 
                    change: 5.3, 
                    changePercent: 1.4,
                    name: 'Microsoft Corp.',
                    high: 382.1,
                    low: 375.2,
                    volume: 18700000,
                    pe: 32.1,
                    marketCap: '2.83T'
                },
                'TSLA': { 
                    symbol: 'TSLA', 
                    price: 250.8, 
                    change: -3.5, 
                    changePercent: -1.38,
                    name: 'Tesla Inc.',
                    high: 258.5,
                    low: 248.2,
                    volume: 142000000,
                    pe: 68.5,
                    marketCap: '792B'
                },
                'BTC': { 
                    symbol: 'BTC', 
                    price: 43250, 
                    change: 1250, 
                    changePercent: 3.0,
                    name: 'Bitcoin',
                    high: 44000,
                    low: 42500,
                    volume: 28500000000,
                    pe: 'N/A',
                    marketCap: '852B'
                },
                'ETH': { 
                    symbol: 'ETH', 
                    price: 2250.5, 
                    change: 85.3, 
                    changePercent: 3.94,
                    name: 'Ethereum',
                    high: 2300,
                    low: 2180,
                    volume: 18500000000,
                    pe: 'N/A',
                    marketCap: '270B'
                }
            };
            
            return mockData[symbol] || null;
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        }

        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'chart') {
                updateChart();
            }
        }

        // 更新统计信息
        function updateStats() {
            const statsContainer = document.getElementById('statsContainer');
            if (stocks.length === 0) {
                statsContainer.innerHTML = '';
                return;
            }
            
            let totalValue = 0;
            let totalChange = 0;
            let gainers = 0;
            let losers = 0;
            
            stocks.forEach(symbol => {
                const data = getMockStockData(symbol);
                if (data) {
                    totalValue += data.price;
                    totalChange += data.change;
                    if (data.change > 0) gainers++;
                    else losers++;
                }
            });
            
            statsContainer.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">平均价格</div>
                    <div class="stat-value">$${(totalValue / stocks.length).toFixed(2)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">总涨跌</div>
                    <div class="stat-value ${totalChange >= 0 ? 'up' : 'down'}">
                        ${totalChange >= 0 ? '+' : ''}${totalChange.toFixed(2)}
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">上涨股票</div>
                    <div class="stat-value up">${gainers}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">下跌股票</div>
                    <div class="stat-value down">${losers}</div>
                </div>
            `;
        }

        // 更新显示
        function updateDisplay() {
            const stockGrid = document.getElementById('stockGrid');
            const stockDetails = document.getElementById('stockDetails');
            
            if (stocks.length === 0) {
                stockGrid.innerHTML = '<div class="loading">输入股票代码开始查询...</div>';
                stockDetails.innerHTML = '<div class="loading">输入股票代码开始查询...</div>';
                return;
            }
            
            let gridHTML = '';
            let detailsHTML = '';
            
            stocks.forEach(symbol => {
                const data = getMockStockData(symbol);
                
                if (data) {
                    const isUp = data.change >= 0;
                    const changeClass = isUp ? 'up' : 'down';
                    const arrow = isUp ? '▲' : '▼';
                    
                    // 概览卡片
                    gridHTML += `
                        <div class="stock-card">
                            <div class="stock-header">
                                <span class="stock-symbol">${data.symbol}</span>
                                <button class="remove-btn" onclick="removeStock('${symbol}')">移除</button>
                            </div>
                            <div class="stock-price">$${data.price.toFixed(2)}</div>
                            <div class="stock-change ${changeClass}">
                                ${arrow} ${Math.abs(data.change).toFixed(2)} (${data.changePercent.toFixed(2)}%)
                            </div>
                            <div class="stock-info">
                                <div class="info-item">高: $${data.high}</div>
                                <div class="info-item">低: $${data.low}</div>
                                <div class="info-item">P/E: ${data.pe}</div>
                                <div class="info-item">成交量: ${formatNumber(data.volume)}</div>
                            </div>
                        </div>
                    `;
                    
                    // 详情卡片
                    detailsHTML += `
                        <div class="stock-card">
                            <div class="stock-header">
                                <div>
                                    <div class="stock-symbol">${data.name}</div>
                                    <div style="color: #94a3b8; font-size: 14px; margin-top: 5px;">${data.symbol}</div>
                                </div>
                                <button class="remove-btn" onclick="removeStock('${symbol}')">移除</button>
                            </div>
                            <div class="stock-price">$${data.price.toFixed(2)}</div>
                            <div class="stock-change ${changeClass}">
                                ${arrow} ${Math.abs(data.change).toFixed(2)} (${data.changePercent.toFixed(2)}%)
                            </div>
                            <div class="stock-info">
                                <div class="info-item"><strong>52周高</strong><br>$${data.high}</div>
                                <div class="info-item"><strong>52周低</strong><br>$${data.low}</div>
                                <div class="info-item"><strong>成交量</strong><br>${formatNumber(data.volume)}</div>
                                <div class="info-item"><strong>市值</strong><br>${data.marketCap}</div>
                                <div class="info-item"><strong>P/E比率</strong><br>${data.pe}</div>
                                <div class="info-item"><strong>涨跌幅</strong><br><span class="${changeClass}">${data.changePercent}%</span></div>
                            </div>
                        </div>
                    `;
                }
            });
            
            stockGrid.innerHTML = gridHTML;
            stockDetails.innerHTML = detailsHTML;
            updateStats();
        }

        // 更新图表
        function updateChart() {
            if (stocks.length === 0) return;
            
            const labels = stocks;
            const data = stocks.map(symbol => {
                const stockInfo = getMockStockData(symbol);
                return stockInfo ? stockInfo.changePercent : 0;
            });
            
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '涨跌幅 (%)',
                        data: data,
                        backgroundColor: data.map(d => d >= 0 ? '#10b981' : '#ef4444'),
                        borderColor: data.map(d => d >= 0 ? '#059669' : '#dc2626'),
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#e2e8f0' }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
        }

        // 添加股票
        function addStock() {
            const input = document.getElementById('symbolInput');
            const symbol = input.value.toUpperCase().trim();
            
            if (!symbol) {
                showError('请输入有效的代码');
                return;
            }
            
            if (stocks.includes(symbol)) {
                showError(`${symbol} 已在列表中`);
                return;
            }
            
            if (!getMockStockData(symbol)) {
                showError(`未找到 ${symbol} 的数据，试试 AAPL, GOOGL, MSFT, BTC, ETH`);
                return;
            }
            
            stocks.push(symbol);
            input.value = '';
            hideError();
            updateDisplay();
        }

        // 删除股票
        function removeStock(symbol) {
            stocks = stocks.filter(s => s !== symbol);
            updateDisplay();
        }

        // 错误处理
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        // 回车添加
        document.getElementById('symbolInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addStock();
            }
        });

        // 初始化
        updateDisplay();
        
        // 定时刷新
        setInterval(() => {
            updateDisplay();
        }, 10000);
    </script>
</body>
</html>
